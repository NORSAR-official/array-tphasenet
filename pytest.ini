[pytest]
testpaths = tests
markers =
    smoke: fast smoke tests for minimal reproducibility checks
filterwarnings =
    ignore:pkg_resources is deprecated as an API.*:UserWarning:obspy.core.util.base
    ignore:Deprecated call to .*declare_namespace.*mpl_toolkits.*:DeprecationWarning:pkg_resources
    ignore:'parseString' deprecated - use 'parse_string':Warning:matplotlib._fontconfig_pattern
    ignore:'resetCache' deprecated - use 'reset_cache':Warning:matplotlib._fontconfig_pattern
    ignore:'enablePackrat' deprecated - use 'enable_packrat':Warning:matplotlib._mathtext
    ignore:jax.xla_computation is deprecated.*:DeprecationWarning:tensorflow.lite.python.util
